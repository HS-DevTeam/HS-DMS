name: CI-CD Docker

on:
  push:
    branches: ["main"]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - run: dotnet restore
      - run: dotnet build --configuration Release --no-restore
      - run: dotnet test --configuration Release --no-build

  docker:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate Version
        id: version
        run: |
          echo "VERSION=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Login Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Image
        run: |
          docker build -t harmoniaseguros/dms-api:${{ steps.version.outputs.VERSION }} .
          docker tag harmoniaseguros/dms-api:${{ steps.version.outputs.VERSION }} harmoniaseguros/dms-api:latest

      - name: Push Image
        run: |
          docker push harmoniaseguros/dms-api:${{ steps.version.outputs.VERSION }}
          docker push harmoniaseguros/dms-api:latest
