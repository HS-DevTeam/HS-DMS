name: Docker Build

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: |
          docker build -t hs-dms:${{ github.sha }} .

      - name: Tag Latest
        run: |
          docker tag hs-dms:${{ github.sha }} \
          ${{ secrets.DOCKER_USERNAME }}/hs-dms:latest

      - name: Push
        run: |
          docker push \
          ${{ secrets.DOCKER_USERNAME }}/hs-dms:latest
