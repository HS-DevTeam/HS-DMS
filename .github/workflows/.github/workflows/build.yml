name: HS-DMS CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build

      - name: Publish
        run: |
          dotnet publish DMS.Api/DMS.Api.csproj \
          -c Release \
          -o publish

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hs-dms-api
          path: publish
